# Conda environment for the standalone Instant-NGP SH field.
#
# Create and activate:
#   conda env create -f instant_ngp_sh/environment.yml
#   conda activate instant_ngp_sh
#
# Then install tiny-cuda-nn (the hash grid + MLP). It MUST be built after torch is
# installed -- its build imports torch -- so it cannot live in the pip section below.
# Install it once the environment is active:
#
#   pip install --no-build-isolation \
#       git+https://github.com/NVlabs/tiny-cuda-nn/#subdirectory=bindings/torch
#
# Targets CUDA 12.6 (e.g. an HPC node with CUDA 12.6.0) with torch 2.4.0.
# Notes:
#   * torch 2.4.0 only ships a cu124 wheel (there is no 2.4.0+cu126 build); a cu124
#     wheel runs fine on a CUDA 12.6 system thanks to CUDA minor-version compatibility.
#   * tiny-cuda-nn is compiled with the 12.6 toolkit installed below. The 12.4-vs-12.6
#     minor mismatch only triggers a harmless warning from PyTorch's build, not an error.
#   * On an HPC you may prefer the system CUDA module instead of the conda toolkit: drop
#     the `cuda-toolkit` line and `module load cuda/12.6.0` before installing tcnn.
#   * To go fully cu126-native instead (drops the torch 2.4.0 pin), use torch>=2.6.0
#     with `--extra-index-url https://download.pytorch.org/whl/cu126`.

name: instant_ngp_sh
channels:
  - nvidia/label/cuda-12.6.0   # CUDA 12.6 toolkit (nvcc) used to compile tiny-cuda-nn
  - conda-forge
dependencies:
  - python=3.11
  - cuda-toolkit               # nvcc + headers required to build tiny-cuda-nn
  - pip
  - pip:
      - --extra-index-url https://download.pytorch.org/whl/cu124
      - torch==2.4.0+cu124
      - numpy>=1.21
      - imageio>=2.19
